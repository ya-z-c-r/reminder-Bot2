services:
  bot:
    build: .
    container_name: reminder_bot

    depends_on:
      - postgres

    env_file:
      - .env

    restart: always

  postgres:
    image: postgres:16

    container_name: reminder_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reminders

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: